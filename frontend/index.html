<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearView | Intelligent Portfolio Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070d;--bg2:#0b1220;--bg3:#121d30;--bg4:#1a2b46;
  --border:#243349;--border2:#2f4768;
  --text:#ecf4ff;--text2:#a7bbd4;--text3:#6f86a6;
  --accent:#28b8ff;--accent2:#6ddbff;--accent3:#148fce;
  --green:#2ce7a0;--red:#ff5f7f;--amber:#ffc46c;--cyan:#28f0ff;
  --bull:#2ce7a0;--bear:#ffc46c;--crisis:#ff5f7f;--trans:#95a8bf;
  font-size:16px;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text)}
body{
  font-family:'Sora',sans-serif;
  font-size:14px;
  line-height:1.6;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 10% 10%, rgba(40,184,255,.17), transparent 34%),
    radial-gradient(circle at 90% 90%, rgba(44,231,160,.1), transparent 35%),
    linear-gradient(140deg, #04060d 0%, #0a1322 45%, #0d1828 100%);
}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em}
.mono{font-family:'JetBrains Mono',monospace}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:228px;flex-shrink:0;background:rgba(11,18,32,.9);backdrop-filter:blur(10px);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;transition:width .2s}
.sidebar-logo{padding:0 20px 24px;display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:#00101b;box-shadow:0 0 22px rgba(40,184,255,.4)}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .15s;position:relative;border-left:3px solid transparent;color:var(--text2);font-size:13px;font-weight:500}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--accent)}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}
.nav-dot.idle{background:var(--border2)}
.nav-dot.loading{background:var(--amber);animation:pulse 1s infinite}
.nav-dot.success{background:var(--green)}
.nav-dot.error{background:var(--red)}
.nav-icon{font-size:16px;width:18px;text-align:center}
.nav-section{padding:8px 20px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-top:8px}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{height:60px;flex-shrink:0;background:rgba(11,18,32,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:10}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.topbar-tickers{display:flex;gap:6px;flex-wrap:wrap;flex:1;justify-content:center}
.ticker-pill{background:rgba(40,184,255,.08);border:1px solid var(--border2);border-radius:100px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)}
.backend-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.backend-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.backend-dot.offline{background:var(--red)}
.offline-banner{background:var(--red);color:#fff;padding:8px 24px;font-size:13px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}

.page{flex:1;padding:28px 32px;max-width:1200px;width:100%}
@media(max-width:768px){.sidebar{display:none}.page{padding:16px}}

/* Cards */
.card{background:linear-gradient(180deg,rgba(11,18,32,.95),rgba(8,14,24,.95));border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 16px 40px rgba(2,6,12,.35);transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease}
.card:hover{transform:translateY(-2px);border-color:rgba(109,219,255,.38);box-shadow:0 20px 48px rgba(2,8,18,.42)}
.card-sm{background:linear-gradient(180deg,rgba(11,18,32,.95),rgba(8,14,24,.95));border:1px solid var(--border);border-radius:12px;padding:16px}
.card-accent{background:linear-gradient(180deg,rgba(20,31,50,.96),rgba(10,20,34,.95));border:1px solid var(--border2);border-radius:16px;padding:24px}

/* Grid */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* Metric cards */
.metric{background:linear-gradient(180deg,rgba(18,29,48,.92),rgba(10,18,30,.92));border-radius:12px;padding:16px;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-value{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--text);line-height:1.2}
.metric-sub{font-size:12px;color:var(--text3);margin-top:4px}
.metric-value.pos{color:var(--green)}
.metric-value.neg{color:var(--red)}

/* Inputs */
input,select,textarea{background:rgba(18,29,48,.95);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;transition:border .15s,box-shadow .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(40,184,255,.15)}
label{font-size:12px;color:var(--text3);margin-bottom:4px;display:block}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#001018}
.btn-primary:hover{filter:brightness(1.05)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-full{width:100%}

/* Tabs */
.tabs{display:flex;gap:2px;background:rgba(18,29,48,.85);border-radius:11px;padding:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:transparent}
.tab.active{background:rgba(11,18,32,.95);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.35)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.td-right{text-align:right}
.td-mono{font-family:'IBM Plex Mono',monospace}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,217,132,.12);color:var(--green)}
.badge-red{background:rgba(255,77,109,.12);color:var(--red)}
.badge-amber{background:rgba(255,179,71,.12);color:var(--amber)}
.badge-blue{background:rgba(108,99,255,.12);color:var(--accent2)}
.badge-gray{background:var(--bg4);color:var(--text3)}
.badge-cyan{background:rgba(0,212,255,.1);color:var(--cyan)}

/* Regime badges */
.regime-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700}
.regime-bull{background:rgba(34,217,132,.12);color:var(--bull)}
.regime-bear{background:rgba(255,179,71,.12);color:var(--bear)}
.regime-crisis{background:rgba(255,77,109,.12);color:var(--crisis)}
.regime-trans{background:rgba(144,150,176,.1);color:var(--trans)}

/* Progress bars */
.pbar{height:6px;background:var(--bg4);border-radius:100px;overflow:hidden}
.pbar-fill{height:100%;border-radius:100px;transition:width .4s}

/* Divider */
.divider{height:1px;background:var(--border);margin:20px 0}

/* Loading */
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--text3);font-size:13px;text-align:center}
.error-wrap{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);border-radius:10px;padding:20px;display:flex;align-items:flex-start;gap:12px}
.error-icon{color:var(--red);font-size:18px;flex-shrink:0}
.error-text{font-size:13px;color:var(--text2)}

/* Form groups */
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-field{flex:1;min-width:140px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}

/* Section headers */
.section-header{margin-bottom:22px;padding:18px 20px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(130deg,rgba(18,29,48,.82),rgba(9,16,28,.82))}
.section-title{font-size:28px;color:var(--text);margin-bottom:6px;line-height:1.2}
.section-sub{font-size:14px;color:var(--text2);max-width:720px}
.section-line{width:50px;height:3px;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:3px;margin-top:10px}

/* Stacked items */
.stack{display:flex;flex-direction:column;gap:12px}
.stack-sm{display:flex;flex-direction:column;gap:8px}

/* Highlight row */
.row-best td{color:var(--text)!important;background:rgba(108,99,255,.06)!important}
.row-best td:first-child{border-left:2px solid var(--accent)}

/* Corr heatmap */
.corr-cell{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 8px}

/* PQC meter */
.entropy-bar{height:8px;border-radius:100px;overflow:hidden;background:var(--bg4)}
.entropy-fill{height:100%;border-radius:100px}

/* Signal bar */
.signal-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.signal-label{font-size:11px;color:var(--text3);width:130px;flex-shrink:0}
.signal-bar{flex:1;height:5px;background:var(--bg4);border-radius:100px;overflow:hidden}
.signal-fill{height:100%;border-radius:100px}
.signal-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);width:38px;text-align:right}

/* Horizon cards */
.horizon-card{background:var(--bg3);border-radius:10px;padding:16px}
.horizon-title{font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.horizon-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}

/* Ticker input */
.ticker-input-wrap{display:flex;flex-wrap:wrap;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;min-height:40px;align-items:center}
.ticker-input-wrap:focus-within{border-color:var(--accent)}
.ticker-tag{display:flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:2px 8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)}
.ticker-tag button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.ticker-tag button:hover{color:var(--red)}
.ticker-inline-input{background:none;border:none;outline:none;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);width:100px;padding:0;min-width:80px}

/* Weight donut placeholder */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Select none on labels */
.nav-item,.tab,.btn{user-select:none}

/* Toggle buttons */
.toggle-group{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:3px}
.toggle-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s}
.toggle-btn.active{background:var(--bg2);color:var(--text)}

/* Regime table */
.regime-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.regime-row:last-child{border-bottom:none}
.regime-name{font-size:12px;color:var(--text2);width:120px;flex-shrink:0}
.regime-pbar{flex:1}
.regime-pct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);width:42px;text-align:right}

/* Attack card */
.attack-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border .2s}
.attack-card.tested{border-color:var(--accent)}

/* Transition matrix */
.tm-cell{font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center;padding:7px 6px}
.tm-head{font-size:10px;color:var(--text3);text-align:center;padding:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}

/* Auth + onboarding */
.auth-shell{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top right,rgba(40,184,255,.24),transparent 44%),radial-gradient(circle at bottom left,rgba(44,231,160,.12),transparent 35%),var(--bg)}
.auth-wrap{width:min(940px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
.auth-panel{background:linear-gradient(180deg,rgba(11,18,32,.95),rgba(8,14,24,.95));border:1px solid var(--border);border-radius:16px;padding:24px}
.auth-title{font-size:30px;line-height:1.2;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:14px}
.auth-disclaimer{border-left:3px solid var(--amber);background:rgba(255,179,71,.08);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.55}
.auth-meta{margin-top:16px;font-size:12px;color:var(--text3)}
.auth-form{display:flex;flex-direction:column;gap:12px}
.auth-error{font-size:12px;color:var(--red)}
.auth-note{font-size:12px;color:var(--text3);line-height:1.5}

/* CSV import */
.import-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.import-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.import-hint{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}
.import-status{margin-top:8px;font-size:12px}
.import-status.ok{color:var(--green)}
.import-status.err{color:var(--red)}
.input-xs{max-width:360px}

@media(max-width:900px){.auth-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── API ──────────────────────────────────────────────────────────────────────
const BASE = (
  window.__VITE_API_BASE_URL ||
  (window.location.protocol.startsWith("http") ? window.location.origin : "http://localhost:8000")
);

const MAX_PORTFOLIO_ENTRIES = 15;
const AUTH_TOKEN_KEY = "clearview-auth-token";
const AUTH_PROFILE_KEY = "clearview-auth-profile";
function authHeader(skipAuth = false) {
  if (skipAuth) return {};
  const token = window.localStorage.getItem(AUTH_TOKEN_KEY);
  if (!token) return {};
  return { Authorization: `Bearer ${token}` };
}

async function apiPost(path, body, opts = {}) {
  const headers = authHeader(opts.skipAuth);
  const res = await fetch(`${BASE}${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...headers },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    window.localStorage.removeItem(AUTH_TOKEN_KEY);
    window.localStorage.removeItem(AUTH_PROFILE_KEY);
    window.dispatchEvent(new Event("clearview-auth-expired"));
  }
  if (!res.ok || data.error || data.detail) throw new Error(data.error || data.detail || `HTTP ${res.status}`);
  return data;
}

async function apiGet(path, opts = {}) {
  const headers = authHeader(opts.skipAuth);
  const res = await fetch(`${BASE}${path}`, {
    headers,
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    window.localStorage.removeItem(AUTH_TOKEN_KEY);
    window.localStorage.removeItem(AUTH_PROFILE_KEY);
    window.dispatchEvent(new Event("clearview-auth-expired"));
  }
  if (!res.ok || data.error || data.detail) throw new Error(data.error || data.detail || `HTTP ${res.status}`);
  return data;
}

const DEFAULT_PORTFOLIO_ENTRIES = [
  { ticker: "RELIANCE.NS", shares: 10, price: 2850, weight: 0.34 },
  { ticker: "TCS.NS", shares: 5, price: 3900, weight: 0.33 },
  { ticker: "INFY.NS", shares: 12, price: 1650, weight: 0.33 },
];

const COMPANY_TO_TICKER = {
  BHARATELECTRONICSLTD: "BEL.NS",
  BIOCONLIMITED: "BIOCON.NS",
  COFORGELIMITED: "COFORGE.NS",
  DRREDDYSLABORATORIES: "DRREDDY.NS",
  HCLTECHNOLOGIESLTD: "HCLTECH.NS",
  HDFCBANKLTD: "HDFCBANK.NS",
  JBMAUTOLIMITED: "JBMA.NS",
  JINDALSTAINLESSLIMITED: "JSL.NS",
  KFINTECHNOLOGIESLIMITED: "KFINTECH.NS",
  MOTILALOSNASDAQ100ETF: "MON100.NS",
  NIPINDETFNIFTYBEES: "NIFTYBEES.NS",
  SAKSOFTLIMITED: "SAKSOFT.NS",
  STATEBANKOFINDIA: "SBIN.NS",
  TATAMOTORSLIMITED: "TATAMOTORS.NS",
};

function normalizeTicker(raw) {
  const t = (raw || "").trim().toUpperCase().replace(/\.$/, "");
  if (!t) return "";
  if (t.startsWith("^")) return t;

  // Already symbol-like values (e.g. SBIN, SBIN.NS, MON100.NS)
  if (/^[A-Z0-9_-]+(?:\.[A-Z]{1,4})?$/.test(t)) {
    return t.includes(".") ? t : `${t}.NS`;
  }

  // Company-name fallback (e.g. "STATE BANK OF INDIA.NS")
  const base = t.endsWith(".NS") ? t.slice(0, -3) : t;
  const compact = base.replace(/[^A-Z0-9]+/g, "");
  if (COMPANY_TO_TICKER[compact]) return COMPANY_TO_TICKER[compact];
  if (!compact) return "";
  return `${compact}.NS`;
}

function alignEntriesToTickers(tickers, existingEntries) {
  const byTicker = {};
  (existingEntries || []).forEach(entry => {
    const ticker = normalizeTicker(entry?.ticker);
    if (!ticker || byTicker[ticker]) return;
    byTicker[ticker] = {
      ticker,
      shares: Number.isFinite(entry.shares) ? entry.shares : null,
      price: Number.isFinite(entry.price) ? entry.price : null,
      weight: Number.isFinite(entry.weight) ? entry.weight : null,
    };
  });
  return (tickers || []).slice(0, MAX_PORTFOLIO_ENTRIES).map(ticker => {
    const normalized = normalizeTicker(ticker);
    return byTicker[normalized] || { ticker: normalized, shares: null, price: null, weight: null };
  });
}

function parseOptionalNumber(raw) {
  if (raw === undefined || raw === null || String(raw).trim() === "") return null;
  const num = Number(String(raw).replace(/,/g, "").trim());
  return Number.isFinite(num) ? num : null;
}

function parseCsvRow(line) {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i += 1) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') {
        cur += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === "," && !inQuotes) {
      out.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  out.push(cur.trim());
  return out;
}

function parsePortfolioCsv(text) {
  const lines = (text || "").split(/\r?\n/).map(line => line.trim()).filter(Boolean);
  if (lines.length < 1) throw new Error("CSV file is empty.");
  const firstRow = parseCsvRow(lines[0]).map(h => h.trim().toLowerCase());
  const headerMap = {
    ticker: ["ticker", "symbol", "stock", "asset", "company", "company_name", "security", "name", "instrument"],
    shares: ["shares", "qty", "quantity", "units"],
    price: ["price", "avg_price", "average_price", "cost"],
    weight: ["weight", "allocation", "weight_pct", "allocation_pct"],
  };
  const hasHeader = firstRow.some(h => [...headerMap.ticker, ...headerMap.shares, ...headerMap.price, ...headerMap.weight].includes(h));
  const header = hasHeader ? firstRow : ["ticker", "shares", "price", "weight"];
  const idxOf = aliases => header.findIndex(h => aliases.includes(h));
  const tickerIdx = idxOf(headerMap.ticker);
  const sharesIdx = idxOf(headerMap.shares);
  const priceIdx = idxOf(headerMap.price);
  const weightIdx = idxOf(headerMap.weight);
  if (tickerIdx === -1 && header.length < 1) {
    throw new Error("CSV must include a ticker or symbol column.");
  }

  const bodyLines = hasHeader ? lines.slice(1) : lines;
  if (bodyLines.length === 0) {
    throw new Error("CSV must contain at least one portfolio entry.");
  }
  if (bodyLines.length > MAX_PORTFOLIO_ENTRIES) {
    throw new Error(`CSV supports up to ${MAX_PORTFOLIO_ENTRIES} entries. Remove extra rows and upload again.`);
  }

  const entries = [];
  bodyLines.forEach(line => {
    const row = parseCsvRow(line);
    const ticker = normalizeTicker(row[tickerIdx >= 0 ? tickerIdx : 0]);
    if (!ticker) return;
    entries.push({
      ticker,
      shares: parseOptionalNumber(sharesIdx >= 0 ? row[sharesIdx] : null),
      price: parseOptionalNumber(priceIdx >= 0 ? row[priceIdx] : null),
      weight: parseOptionalNumber(weightIdx >= 0 ? row[weightIdx] : null),
    });
  });

  if (entries.length === 0) throw new Error("No valid portfolio rows found in the uploaded CSV.");

  const seen = new Set();
  const deduped = [];
  entries.forEach(entry => {
    if (!seen.has(entry.ticker) && deduped.length < MAX_PORTFOLIO_ENTRIES) {
      seen.add(entry.ticker);
      deduped.push(entry);
    }
  });

  return {
    entries: deduped,
    tickers: deduped.map(entry => entry.ticker),
  };
}

function weightsFromEntries(entries, tickers) {
  const input = entries || [];
  const list = tickers || [];
  const weightMap = {};
  input.forEach(entry => {
    if (entry?.ticker && Number.isFinite(entry.weight)) {
      weightMap[entry.ticker] = entry.weight > 1 ? entry.weight / 100 : entry.weight;
    }
  });
  const series = list.map(ticker => weightMap[ticker] || 0);
  const total = series.reduce((sum, v) => sum + v, 0);
  if (total <= 0) return list.map(() => (100 / Math.max(list.length, 1)));
  return series.map(v => (v / total) * 100);
}

function holdingsFromEntries(entries) {
  return (entries || [])
    .filter(entry => entry?.ticker)
    .slice(0, MAX_PORTFOLIO_ENTRIES)
    .map(entry => ({
      ticker: entry.ticker,
      shares: Number.isFinite(entry.shares) ? Math.max(0, entry.shares) : 0,
      price: Number.isFinite(entry.price) ? Math.max(0, entry.price) : 0,
    }));
}

const useStore = (() => {

  let state = {
    tickers: ["RELIANCE.NS", "TCS.NS", "INFY.NS"],
    portfolioEntries: DEFAULT_PORTFOLIO_ENTRIES,
    riskFreeRate: 0.07,

    m5: { result: null, status: "idle" },
    m6: { result: null, status: "idle" },
    m7: { result: null, status: "idle" },
  };
  function setState(patch) {
    state = { ...state, ...patch };
    listeners.forEach(fn => fn(state));
  }
  function setModule(key, result) {
    setState({ [key]: { result, status: "success" } });
  }
  function setStatus(key, status) {
    setState({ [key]: { ...state[key], status } });
  }
  return function() {
    const [s, setS] = useState(state);
    useEffect(() => {
      listeners.push(setS);
      return () => { listeners = listeners.filter(f => f !== setS); };
    }, []);
    return [s, setState, setModule, setStatus];
  };
})();

function TickerInput({ tickers, onChange }) {
  const [val, setVal] = useState("");
  const inputRef = useRef();
  function add() {
    const normalized = normalizeTicker(val);
    if (!normalized) return;
    if (tickers.length >= MAX_PORTFOLIO_ENTRIES) return;
    if (!tickers.includes(normalized)) onChange([...tickers, normalized]);
    setVal("");
  }
  function remove(t) { onChange(tickers.filter(x => x !== t)); }
  function onKey(e) {
    if (e.key === "Enter" || e.key === ",") { e.preventDefault(); add(); }
    if (e.key === "Backspace" && !val && tickers.length > 0) onChange(tickers.slice(0, -1));
  }
  return (
    <div className="ticker-input-wrap" onClick={() => inputRef.current?.focus()}>
      {tickers.map(t => (
        <span key={t} className="ticker-tag">
          {t}
          <button onClick={() => remove(t)}>×</button>
        </span>
      ))}
      {tickers.length < MAX_PORTFOLIO_ENTRIES && (
        <input
          ref={inputRef}
          className="ticker-inline-input"
          placeholder={tickers.length === 0 ? "Type ticker…" : "Add more…"}
          value={val}
          onChange={e => setVal(e.target.value)}
          onKeyDown={onKey}
          onBlur={add}
        />
      )}
      <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--text3)" }}>{tickers.length}/{MAX_PORTFOLIO_ENTRIES}</span>
    </div>
  );
}

function PortfolioCsvImport({ onImport }) {
  const [status, setStatus] = useState("");
  const [statusKind, setStatusKind] = useState("");

  async function handleFileUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith(".csv")) {
      setStatusKind("err");
      setStatus("Please upload a valid .csv file.");
      event.target.value = "";
      return;
    }

    try {
      const text = await file.text();
      const parsed = parsePortfolioCsv(text);
      onImport(parsed);
      setStatusKind("ok");
      setStatus(`Imported ${parsed.entries.length} entries from ${file.name}.`);
    } catch (err) {
      setStatusKind("err");
      setStatus(err?.message || "CSV import failed.");
    }
    event.target.value = "";
  }

  return (
    <div className="import-wrap">
      <label>Portfolio CSV Import</label>
      <div className="import-row">
        <input className="input-xs" type="file" accept=".csv,text/csv" onChange={handleFileUpload} />
      </div>
      <p className="import-hint">
        Include a header row with <span className="mono">ticker</span>, <span className="mono">symbol</span>, or <span className="mono">company</span> when available (headerless files are also accepted).
        Company names are auto-converted to ticker symbols when recognized.
        Optional columns: <span className="mono">shares</span>, <span className="mono">price</span>, <span className="mono">weight</span>.
        Maximum {MAX_PORTFOLIO_ENTRIES} entries per file.
      </p>
      {status && <p className={`import-status ${statusKind}`}>{status}</p>}
    </div>
  );
}

function WeightDonut({ weights, title }) {
  const entries = Object.entries(weights || {}).sort((a, b) => b[1] - a[1]);
  const colors = ["#6c63ff","#22d984","#00d4ff","#ffb347","#ff4d6d","#8b84ff","#a3ffd4","#ffe083"];
  const total = entries.reduce((s, [, v]) => s + v, 0);
  // Simple SVG donut
  const r = 56, cx = 70, cy = 70, stroke = 18;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const slices = entries.map(([k, v], i) => {
    const pct = total > 0 ? v / total : 0;
    const dash = pct * circ;
    const gap = circ - dash;
    const sl = (
      <circle
        key={k}
        cx={cx} cy={cy} r={r}
        fill="none"
        stroke={colors[i % colors.length]}
        strokeWidth={stroke}
        strokeDasharray={`${dash} ${gap}`}
        strokeDashoffset={-offset}
        style={{ transition: "stroke-dasharray .4s" }}
      />
    );
    offset += dash;
    return sl;
  });

  return (
    <div className="donut-wrap">
      {title && <p style={{ fontSize: 12, color: "var(--text3)", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".06em" }}>{title}</p>}
      <svg width="140" height="140" style={{ transform: "rotate(-90deg)" }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg4)" strokeWidth={stroke} />
        {slices}
      </svg>
      <div className="stack-sm" style={{ width: "100%" }}>
        {entries.slice(0, 8).map(([k, v], i) => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: colors[i % colors.length], flexShrink: 0 }} />
            <span style={{ flex: 1, color: "var(--text2)", fontFamily: "IBM Plex Mono, monospace" }}>{k.replace(".NS", "")}</span>
            <span style={{ color: "var(--text)", fontFamily: "IBM Plex Mono, monospace" }}>{fmtPct(v)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FrontierChart({ frontier, specialPoints }) {
  if (!frontier || frontier.length === 0) return <p style={{ color: "var(--text3)", fontSize: 13 }}>No frontier data.</p>;
  const allX = [...frontier.map(p => p.volatility * 100), ...(specialPoints || []).map(p => p.x)];
  const allY = [...frontier.map(p => p.return * 100), ...(specialPoints || []).map(p => p.y)];
  const xMin = Math.min(...allX) * 0.92, xMax = Math.max(...allX) * 1.08;
  const yMin = Math.min(...allY) * 0.9, yMax = Math.max(...allY) * 1.1;
  const W = 480, H = 260, PAD = { t: 20, r: 20, b: 40, l: 50 };
  const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
  const px = v => PAD.l + ((v - xMin) / (xMax - xMin)) * cW;
  const py = v => PAD.t + (1 - (v - yMin) / (yMax - yMin)) * cH;
  const path = frontier.map((p, i) => `${i === 0 ? "M" : "L"}${px(p.volatility * 100).toFixed(1)},${py(p.return * 100).toFixed(1)}`).join(" ");

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", maxHeight: 280 }}>
      {/* Grid lines */}
      {[0.25, 0.5, 0.75].map(t => (
        <line key={t} x1={PAD.l} x2={W - PAD.r} y1={PAD.t + t * cH} y2={PAD.t + t * cH} stroke="var(--border)" strokeDasharray="4 4" />
      ))}
      {/* Axes */}
      <line x1={PAD.l} x2={PAD.l} y1={PAD.t} y2={H - PAD.b} stroke="var(--border2)" />
      <line x1={PAD.l} x2={W - PAD.r} y1={H - PAD.b} y2={H - PAD.b} stroke="var(--border2)" />
      {/* Axis labels */}
      <text x={PAD.l - 6} y={PAD.t + cH * 0.1} textAnchor="end" fontSize={10} fill="var(--text3)">{((yMin + (yMax - yMin) * 0.9)).toFixed(1)}%</text>
      <text x={PAD.l - 6} y={PAD.t + cH * 0.9} textAnchor="end" fontSize={10} fill="var(--text3)">{((yMin + (yMax - yMin) * 0.1)).toFixed(1)}%</text>
      <text x={PAD.l} y={H - 8} textAnchor="start" fontSize={10} fill="var(--text3)">{xMin.toFixed(1)}%</text>
      <text x={W - PAD.r} y={H - 8} textAnchor="end" fontSize={10} fill="var(--text3)">{xMax.toFixed(1)}%</text>
      <text x={W / 2} y={H - 4} textAnchor="middle" fontSize={10} fill="var(--text3)">Volatility</text>
      <text x={10} y={H / 2} textAnchor="middle" fontSize={10} fill="var(--text3)" transform={`rotate(-90,10,${H / 2})`}>Return</text>
      {/* Frontier curve */}
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth={2.5} strokeLinecap="round" />
      {/* Special points */}
      {(specialPoints || []).map((sp, i) => (
        <g key={i}>
          <circle cx={px(sp.x)} cy={py(sp.y)} r={6} fill={sp.fill} stroke="var(--bg2)" strokeWidth={2} />
          <text x={px(sp.x) + 9} y={py(sp.y) + 4} fontSize={10} fill={sp.fill}>{sp.label}</text>
        </g>
      ))}
    </svg>
  );
}

        { l: "Status", v: r.transaction?.verified ? "Verified ✓" : "Unverified" },
      ] : [] },
    { key: "m7", label: "Regime Outlook", icon: "◉", page: "regime", color: "var(--accent2)",
      getMetrics: r => r ? [
        { l: "Regime", v: r.current_regime || "—" },
        { l: "Current Volatility", v: fmtPct(r.garch_current_vol) },
        { l: "30-Day Outlook", v: fmtPct(r.garch_30d_forecast) },
      ] : [] },
  ];

  const insights = [];
  if (store.m7.result) {
    const r = store.m7.result;
    const p = r.regime_probabilities?.[r.current_regime] || 0;
    insights.push({ text: `Regime Outlook indicates "${r.current_regime}" conditions with ${(p * 100).toFixed(0)}% confidence.`, color: "var(--accent2)" });
  }
  if (store.m5.result) {
    const r = store.m5.result;
    insights.push({ text: `Allocation Strategy selected ${(r.best_method || "").replace(/_/g, " ")} as the strongest approach right now.`, color: "var(--green)" });
  }
  if (store.m3.result) {
    const r = store.m3.result;
    insights.push({ text: `Performance & Risk estimates return at ${fmtPct(r.max_sharpe_portfolio?.expected_return)} with risk at ${fmtPct(r.max_sharpe_portfolio?.volatility)}.`, color: "var(--accent)" });
  }

  return (
    <div className="page fade-in">
      <div className="section-header">
        <h1 className="section-title">Executive Dashboard</h1>
        <p className="section-sub">See your portfolio status, key signals, and next actions in one clear view.</p>
        <div className="section-line" />
      </div>

      {/* Context panel */}
      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <span style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 600 }}>Portfolio Context</span>
        </div>
        <div style={{ marginBottom: 14 }}>
          <PortfolioCsvImport onImport={importPortfolioCsv} />
        </div>
        <div className="form-grid" style={{ marginBottom: 14 }}>
          <div className="form-field">
            <label>Active Tickers</label>
            <TickerInput tickers={tickers} onChange={setTickers} />
          </div>
          <div className="form-field">
            <label>Risk-Free Rate (%)</label>
            <input type="number" value={rf} onChange={e => setRf(+e.target.value)} step="0.5" min="0" max="20" />
          </div>
          <div className="form-field">
            <label>Portfolio Value (₹)</label>
            <input type="number" value={pv} onChange={e => setPv(+e.target.value)} step="100000" />
          </div>
        </div>
        <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 10 }}>
          Tip: Upload a CSV first for faster setup, then fine-tune tickers manually if needed.
        </p>
        <button className="btn btn-primary btn-sm" onClick={update}>Update Context</button>
      </div>

      {/* Module grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 14, marginBottom: 24 }}>
        {modules.map(mod => {
          const ms = store[mod.key];
          const metrics = mod.getMetrics(ms.result);
          return (
            <div key={mod.key}
              className="card"
              style={{ cursor: "pointer", borderLeft: `3px solid ${mod.color}`, transition: "background .15s" }}
              onClick={() => setPage(mod.page)}
              onMouseEnter={e => e.currentTarget.style.background = "var(--bg3)"}
              onMouseLeave={e => e.currentTarget.style.background = "var(--bg2)"}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", fontFamily: "Source Serif 4, serif" }}>{mod.label}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                    <div className={`nav-dot ${ms.status}`} />
                    <span style={{ fontSize: 11, color: ms.status === "success" ? "var(--green)" : ms.status === "error" ? "var(--red)" : ms.status === "loading" ? "var(--amber)" : "var(--text3)" }}>
                      {ms.status === "idle" ? "Not yet run" : ms.status === "loading" ? "Processing…" : ms.status === "success" ? "Ready" : "Error"}
                    </span>
                  </div>
                </div>
                <span style={{ fontSize: 18, color: mod.color, opacity: .7 }}>→</span>
              </div>
              {metrics.length > 0 ? (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginTop: 8 }}>
                  {metrics.map(m => (
                    <div key={m.l}>
                      <p style={{ fontSize: 10, color: "var(--text3)", marginBottom: 2 }}>{m.l}</p>
                      <p style={{ fontFamily: "IBM Plex Mono, monospace", fontSize: 12, color: "var(--text)", fontWeight: 500 }}>{m.v}</p>
                    </div>
                  ))}
                </div>
              ) : (
                <p style={{ fontSize: 12, color: "var(--text3)", fontStyle: "italic", marginTop: 8 }}>Run module to see results</p>
              )}
            </div>
          );
        })}
      </div>

      {/* Insights */}
      {insights.length > 0 && (
        <div>
          <p style={{ fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 600, marginBottom: 10 }}>Insights</p>
          <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 4 }}>
            {insights.map((ins, i) => (
              <div key={i} className="card-sm" style={{ minWidth: 260, borderLeft: `3px solid ${ins.color}`, flexShrink: 0 }}>
                <p style={{ fontSize: 13, color: "var(--text2)", lineHeight: 1.5 }}>{ins.text}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// PORTFOLIO (M3)
function Portfolio() {
  const [store, setState, setModule, setStatus] = useStore();
  const [tickers, setTickers] = useState(store.tickers);
  const [period, setPeriod] = useState("2y");
  const [rf, setRf] = useState(store.riskFreeRate * 100);
  const [weights, setWeights] = useState(weightsFromEntries(store.portfolioEntries, store.tickers));
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [tab, setTab] = useState("frontier");
  const ms = store.m3;

  function syncTickers(nextTickers) {
    const normalized = nextTickers.slice(0, MAX_PORTFOLIO_ENTRIES);
    setTickers(normalized);
    setWeights(weightsFromEntries(store.portfolioEntries, normalized));
    setState({ tickers: normalized, portfolioEntries: alignEntriesToTickers(normalized, store.portfolioEntries) });
  }

  function importPortfolioCsv(parsed) {
    setTickers(parsed.tickers);
    setWeights(weightsFromEntries(parsed.entries, parsed.tickers));
    setState({ tickers: parsed.tickers, portfolioEntries: parsed.entries });
  }

  async function run() {
    setLoading(true); setError(null); setStatus("m3", "loading");
    try {
      const total = weights.reduce((a, b) => a + b, 0);
      const norm = weights.map(w => w / total);
      const res = await apiPost("/api/m3/optimize", { tickers, current_weights: norm, period, risk_free_rate: rf / 100 });
      setModule("m3", res);
    } catch (e) { setError(e.message); setStatus("m3", "error"); }
    setLoading(false);
  }

  const d = ms.result;
  const PERIODS = ["6mo", "1y", "2y", "5y"];

  return (
    <div className="page fade-in">
      <div className="section-header">
        <h1 className="section-title">Portfolio Performance & Risk</h1>
        <p className="section-sub">Understand expected return, risk level, and recommended allocation in simple terms.</p>
        <div className="section-line" />
      </div>

      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ marginBottom: 14 }}>
          <PortfolioCsvImport onImport={importPortfolioCsv} />
        </div>
        <div className="form-grid" style={{ marginBottom: 16 }}>
          <div className="form-field" style={{ gridColumn: "1 / -1" }}>
            <label>Tickers</label>
            <TickerInput tickers={tickers} onChange={syncTickers} />
          </div>
          <div className="form-field">
            <label>Period</label>
            <div className="toggle-group">
              {PERIODS.map(p => <button key={p} className={`toggle-btn${period === p ? " active" : ""}`} onClick={() => setPeriod(p)}>{p}</button>)}
            </div>
          </div>
          <div className="form-field">
            <label>Risk-Free Rate: {rf.toFixed(1)}%</label>
            <input type="range" min="0" max="15" step="0.5" value={rf} onChange={e => setRf(+e.target.value)} style={{ width: "100%" }} />
          </div>
        </div>
        <div className="stack-sm" style={{ marginBottom: 16 }}>
          <label>Current Weights</label>
          {tickers.map((t, i) => (
            <div key={t} style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span className="mono" style={{ width: 120, fontSize: 12, color: "var(--text2)", flexShrink: 0 }}>{t}</span>
              <input type="number" value={(weights[i] || 0).toFixed(1)} onChange={e => { const w = [...weights]; w[i] = +e.target.value; setWeights(w); }} style={{ width: 80 }} min={0} max={100} />
              <span style={{ fontSize: 12, color: "var(--text3)" }}>%</span>
            </div>
          ))}
        </div>
        <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 8 }}>
          Keep the list focused for clearer results. Maximum supported entries: {MAX_PORTFOLIO_ENTRIES}.
        </p>
        <button className="btn btn-primary btn-full" onClick={run} disabled={loading || tickers.length < 2}>
          {loading ? "Running…" : "Run Analysis"}
        </button>
      </div>

      {loading && <Spinner msg="Optimising portfolio — analysing historical returns and covariance…" />}
      {error && <ErrorCard msg={error} onRetry={run} />}
      {d && !loading && (
        <div className="fade-in">
          <Tabs
            tabs={[{ id: "frontier", label: "Risk vs Return" }, { id: "allocations", label: "Suggested Mix" }, { id: "risk", label: "Risk Snapshot" }, { id: "correlation", label: "Move Together" }]}
            active={tab} onChange={setTab}
          />
          {tab === "frontier" && (
            <div className="card">
              <h3 style={{ marginBottom: 16 }}>Risk vs Return Curve</h3>
              <FrontierChart
                frontier={d.efficient_frontier}
                specialPoints={[
                  { x: d.min_variance_portfolio.volatility * 100, y: d.min_variance_portfolio.expected_return * 100, label: "Min Variance", fill: "#6c63ff" },
                  { x: d.max_sharpe_portfolio.volatility * 100, y: d.max_sharpe_portfolio.expected_return * 100, label: "Max Sharpe", fill: "#22d984" },
                  { x: d.current_portfolio.volatility * 100, y: d.current_portfolio.expected_return * 100, label: "Your Portfolio", fill: "#ff4d6d" },
                ]}
              />
              <div className="divider" />
              <table>
                <thead><tr><th>Metric</th><th className="td-right">Your Portfolio</th><th className="td-right">Min Variance</th><th className="td-right">Max Sharpe</th></tr></thead>
                <tbody>
                  {[["Expected Return", "expected_return", fmtPct], ["Volatility", "volatility", fmtPct], ["Sharpe Ratio", "sharpe_ratio", v => fmtMono(v)]].map(([l, k, f]) => (
                    <tr key={k}><td>{l}</td><td className="td-right td-mono">{f(d.current_portfolio[k])}</td><td className="td-right td-mono">{f(d.min_variance_portfolio[k])}</td><td className="td-right td-mono">{f(d.max_sharpe_portfolio[k])}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {tab === "allocations" && (
            <div className="card">
              <div className="grid-2" style={{ marginBottom: 24 }}>
                <WeightDonut weights={d.min_variance_portfolio.weights} title="Min Variance" />
                <WeightDonut weights={d.max_sharpe_portfolio.weights} title="Max Sharpe" />
              </div>
              <table>
                <thead><tr><th>Ticker</th><th className="td-right">Min-Var</th><th className="td-right">Max-Sharpe</th><th className="td-right">Difference</th></tr></thead>
                <tbody>
                  {d.tickers.map(t => {
                    const mv = (d.min_variance_portfolio.weights[t] || 0) * 100;
                    const ms2 = (d.max_sharpe_portfolio.weights[t] || 0) * 100;
                    return <tr key={t}><td className="td-mono">{t}</td><td className="td-right td-mono">{mv.toFixed(1)}%</td><td className="td-right td-mono">{ms2.toFixed(1)}%</td><td className="td-right td-mono" style={{ color: ms2 - mv >= 0 ? "var(--green)" : "var(--red)" }}>{sign(ms2 - mv)}{(ms2 - mv).toFixed(1)}%</td></tr>;
                  })}
                </tbody>
              </table>
            </div>
          )}
          {tab === "risk" && (
            <div className="stack">
              <div className="grid-4">
                <Metric label="VaR 95%" value={fmtPct(d.risk_metrics?.var_95_pct)} color="red" />
                <Metric label="Deep-Loss Estimate" value={fmtPct(d.risk_metrics?.cvar_95_pct)} color="red" />
                <Metric label="Max Drawdown" value={fmtPct(d.risk_metrics?.max_drawdown)} color="amber" />
                <Metric label="Ulcer Index" value={fmtMono(d.risk_metrics?.ulcer_index, 4)} />
              </div>
              {d.risk_metrics?.recovery_days > 0 && <p style={{ fontSize: 13, color: "var(--text3)" }}>Recovery time: ~{d.risk_metrics.recovery_days} trading days</p>}
              {d.factor_analysis && (
                <div className="card">
                  <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".06em" }}>Factor Decomposition</p>
                  <div className="pbar" style={{ height: 10, marginBottom: 8 }}>
                    <div className="pbar-fill" style={{ width: `${(d.factor_analysis.r_squared * 100).toFixed(0)}%`, background: "var(--accent)" }} />
                  </div>
                  <p style={{ fontSize: 13, color: "var(--text2)" }}>
                    <strong style={{ color: "var(--text)" }}>{(d.factor_analysis.r_squared * 100).toFixed(0)}%</strong> of your portfolio moves with the overall market.
                    The remaining <strong style={{ color: "var(--text)" }}>{((1 - d.factor_analysis.r_squared) * 100).toFixed(0)}%</strong> is driven by your specific stock selection.
                  </p>
                  <div className="grid-3" style={{ marginTop: 12 }}>
                    <Metric label="Systematic Vol" value={fmtPct(d.factor_analysis.systematic_volatility)} />
                    <Metric label="Idiosyncratic Vol" value={fmtPct(d.factor_analysis.idiosyncratic_volatility)} />
                    <Metric label="R-Squared" value={fmtMono(d.factor_analysis.r_squared)} />
                  </div>
                </div>
              )}
              {d.market_regime && (
                <div className="card-sm">
                  <p style={{ fontSize: 12, color: "var(--text3)", marginBottom: 6 }}>Simple Market Regime</p>
                  <span className={`regime-badge ${regimeBadgeClass(d.market_regime.regime)}`}>{regimeIcon(d.market_regime.regime)} {d.market_regime.regime}</span>
                  <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 6 }}>Current annualised vol: {fmtPct(d.market_regime.current_vol_annualized)}</p>
                </div>
              )}
            </div>
          )}
          {tab === "correlation" && (
            <div className="card" style={{ overflowX: "auto" }}>
              <h3 style={{ marginBottom: 16 }}>How Your Stocks Move Together</h3>
              <table>
                <thead>
                  <tr>
                    <th></th>
                    {d.tickers.map(t => <th key={t} className="td-right" style={{ fontFamily: "IBM Plex Mono,monospace", fontSize: 10 }}>{t.replace(".NS", "")}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {d.tickers.map(row => (
                    <tr key={row}>
                      <td style={{ fontFamily: "IBM Plex Mono,monospace", fontSize: 11 }}>{row.replace(".NS", "")}</td>
                      {d.tickers.map(col => {
                        const val = d.correlation_matrix[row]?.[col] ?? 0;
                        const isDiag = row === col;
                        return (
                          <td key={col} className="corr-cell"
                            style={{ background: isDiag ? "rgba(108,99,255,.15)" : `rgba(255,77,109,${val * 0.35})`, color: "var(--text)" }}>
                            {val.toFixed(2)}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// STRESS TEST (M4)
function StressTest() {
  const [store, setState, setModule, setStatus] = useStore();
  const [tickers, setTickers] = useState(store.tickers);
  const [pv, setPv] = useState(store.portfolioValue);
  const [rf, setRf] = useState(store.riskFreeRate * 100);
  const [mode, setMode] = useState("ALL");
  const [custom, setCustom] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [expanded, setExpanded] = useState(null);
  const ms = store.m4;

  const CODES = ["CRISIS_1","CRISIS_2","MOD_1","MOD_2","MOD_3","MILD_1","MILD_2","MILD_3","MILD_4","GEOPOLITICAL","INFLATION","RATE_SHOCK","LIQUIDITY"];

  async function run() {
    setLoading(true); setError(null); setStatus("m4", "loading");
    try {
      const scenarios = mode === "CUSTOM" ? custom.join(",") : mode;
      const res = await apiPost("/api/m4/scenarios", { tickers, portfolio_value: pv, risk_free_rate: rf / 100, scenarios });
      setModule("m4", res);
    } catch (e) { setError(e.message); setStatus("m4", "error"); }
    setLoading(false);
  }

  const d = ms.result;
  const riskColor = { HIGH: "var(--red)", MODERATE: "var(--amber)", ACCEPTABLE: "var(--green)", high: "var(--red)", moderate: "var(--amber)", acceptable: "var(--green)" };

  return (
    <div className="page fade-in">
      <div className="section-header">
        <h1 className="section-title">Stress Test Scenarios</h1>
        <p className="section-sub">Check how your portfolio may perform during difficult market conditions.</p>
        <div className="section-line" />
      </div>

      <div className="card" style={{ marginBottom: 20 }}>
        <div className="form-grid" style={{ marginBottom: 16 }}>
          <div style={{ gridColumn: "1 / -1" }}>
            <label>Tickers</label>
            <TickerInput tickers={tickers} onChange={setTickers} />
          </div>
          <div><label>Portfolio Value (₹)</label><input type="number" value={pv} onChange={e => setPv(+e.target.value)} /></div>
          <div><label>Risk-Free Rate (%)</label><input type="number" value={rf} onChange={e => setRf(+e.target.value)} step="0.5" /></div>
        </div>
        <div style={{ marginBottom: 16 }}>
          <label>Scenarios</label>
          <div className="toggle-group" style={{ marginTop: 6 }}>
            {["ALL", "SEVERE", "CUSTOM"].map(m => <button key={m} className={`toggle-btn${mode === m ? " active" : ""}`} onClick={() => setMode(m)}>{m === "ALL" ? "All" : m === "SEVERE" ? "Severe Only" : "Custom"}</button>)}
          </div>
          {mode === "CUSTOM" && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12 }}>
              {CODES.map(c => (
                <label key={c} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, cursor: "pointer", color: "var(--text2)" }}>
                  <input type="checkbox" checked={custom.includes(c)} onChange={e => setCustom(e.target.checked ? [...custom, c] : custom.filter(x => x !== c))} style={{ width: "auto" }} />
                  {c.replace(/_/g, " ")}
                </label>
              ))}
            </div>
          )}
        </div>
        <button className="btn btn-primary btn-full" onClick={run} disabled={loading || tickers.length < 2}>
          {loading ? "Running…" : "Run Stress Test"}
        </button>
      </div>

      {loading && <Spinner msg="Running scenarios against live market data…" />}
      {error && <ErrorCard msg={error} onRetry={run} />}
      {d && !loading && (
        <div className="fade-in stack">
          {/* Summary */}
          <div className="grid-3">
            <div className="metric">
              <div className="metric-label">Worst Loss</div>
              <div className="metric-value neg">{fmtINR(d.summary?.worst_loss?.pnl_inr)}</div>
              <div className="metric-sub">{d.summary?.worst_loss?.scenario}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Best Gain</div>
              <div className="metric-value pos">{fmtINR(d.summary?.best_gain?.pnl_inr)}</div>
              <div className="metric-sub">{d.summary?.best_gain?.scenario}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Risk Level</div>
              <div className="metric-value" style={{ fontSize: 16, color: riskColor[d.summary?.risk_level] || "var(--text)" }}>{d.summary?.risk_level}</div>
              <div className="metric-sub">{d.summary?.risk_message}</div>
            </div>
          </div>

          {/* Base stats */}
          <div className="grid-4">
            <Metric label="Expected Return" value={fmtPct(d.optimal_portfolio?.expected_return)} />
            <Metric label="Volatility" value={fmtPct(d.optimal_portfolio?.volatility)} />
            <Metric label="Sharpe" value={fmtMono(d.optimal_portfolio?.sharpe_ratio)} />
            <Metric label="VaR 95% (₹)" value={fmtINR(d.risk_metrics?.var_parametric_inr)} color="red" />
          </div>

          {/* Scenario cards */}
          <div className="grid-2">
            {(d.scenarios_tested || []).map(s => {
              const isLoss = s.pnl_inr < 0;
              const isExpanded = expanded === s.code;
              return (
                <div key={s.code} className="card-sm" style={{ cursor: "pointer", borderLeft: `3px solid ${isLoss ? "var(--red)" : "var(--green)"}` }}
                  onClick={() => setExpanded(isExpanded ? null : s.code)}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                    <div>
                      <p style={{ fontWeight: 600, fontSize: 13, color: "var(--text)" }}>{s.name}</p>
                      <span className="badge badge-gray" style={{ marginTop: 3 }}>{s.category}</span>
                    </div>
                    <span style={{ fontSize: 11, color: "var(--text3)" }}>{s.likelihood}</span>
                  </div>
                  <p style={{ fontFamily: "IBM Plex Mono,monospace", fontSize: 20, fontWeight: 500, color: isLoss ? "var(--red)" : "var(--green)" }}>
                    {isLoss ? "" : "+"}{fmtINR(s.pnl_inr)}
                  </p>
                  <p style={{ fontSize: 12, color: isLoss ? "var(--red)" : "var(--green)" }}>{sign(s.pnl_pct * 100)}{(s.pnl_pct * 100).toFixed(2)}%</p>
                  <div className="pbar" style={{ marginTop: 8 }}>
                    <div className="pbar-fill" style={{ width: `${Math.min(Math.abs(s.pnl_pct) * 200, 100)}%`, background: isLoss ? "var(--red)" : "var(--green)" }} />
                  </div>
                  <div style={{ marginTop: 6, display: "flex", gap: 6 }}>
                    <span className={`badge ${s.sharpe_change < 0 ? "badge-red" : "badge-green"}`}>Sharpe {sign(s.sharpe_change)}{s.sharpe_change.toFixed(3)}</span>
                  </div>
                  {isExpanded && (
                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--border)", fontSize: 12, color: "var(--text3)" }}>

  );
}

  const totalValue = holdings.reduce((s, h) => s + h.shares * h.price, 0);

      setAttackResults({});

      type: "sybil_trust_poisoning",
      name: "Sybil Trust Poisoning",
      desc: "Many fake identities are used to trick trust and reputation systems.",
      protect: "Pattern matching and behavior scoring flag repeated fake identity activity.",
    },
    {
      type: "model_extraction",
      name: "Model Extraction",
      desc: "An attacker probes the system to learn how detection rules work.",
      protect: "The system tracks suspicious probing patterns and raises risk levels.",
    },
    {
      type: "side_channel_timing_leaks",
      name: "Side Channel Timing Leaks",
      desc: "Timing differences are used to guess internal security decisions.",
      protect: "Timing anomalies are monitored and high-risk patterns are quarantined.",
    },
    {
      type: "fault_injection",
      name: "Fault Injection",
      desc: "Hardware or process faults are forced to break validation steps.",
      protect: "Cross-checks across PQC and Bayesian layers reduce single-point failure risk.",
    },
    {
      type: "triangular_fraud",
      name: "Triangular Fraud",
      desc: "Three linked transactions are used to hide fraudulent value movement.",
      protect: "Linked pattern analysis spots unusual circular movement and flags it.",
    },
    {
      type: "price_oracle_manipulation",
      name: "Price Oracle Manipulation",
      desc: "A fake price feed is used to push bad pricing into the system.",
      protect: "Price outlier detection and integrity checks block abnormal price shocks.",

    {
      type: "front_running_sandwich_attack",
      name: "Front Running (Sandwich Attack)",
      desc: "Trades are inserted before and after a target order to exploit it.",
      protect: "Sequence and replay signals help detect this pattern and trigger controls.",
    },
  ];

    if (!ms.result?.transaction) return;

      const res = await apiPost("/api/m6/security/test", { transaction: ms.result.transaction, attack_type: type });
      setAttackResults(prev => ({ ...prev, [type]: res }));

      setAttackResults(prev => ({ ...prev, [type]: { error: e.message } }));

                const W = 480, H = 200, PAD = { t: 20, r: 20, b: 30, l: 50 };
                const vals = pts.map(([, v]) => v.vol_ann * 100);
                const uppers = pts.map(([, v]) => v.ci_upper_95 * 100);
                const lowers = pts.map(([, v]) => v.ci_lower_95 * 100);
                const yMin = Math.min(...lowers) * 0.9, yMax = Math.max(...uppers) * 1.1;
                const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
                const px = i => PAD.l + (i / (pts.length - 1)) * cW;
                const py = v => PAD.t + (1 - (v - yMin) / (yMax - yMin)) * cH;
                const linePath = pts.map(([, v], i) => `${i === 0 ? "M" : "L"}${px(i).toFixed(1)},${py(v.vol_ann * 100).toFixed(1)}`).join(" ");

                  ...pts.map(([, v], i) => `${i === 0 ? "M" : "L"}${px(i).toFixed(1)},${py(v.ci_upper_95 * 100).toFixed(1)}`),
                  ...pts.map(([, v], i) => `L${px(pts.length - 1 - i).toFixed(1)},${py(pts[pts.length - 1 - i][1].ci_lower_95 * 100).toFixed(1)}`),
                  "Z",
                ].join(" ");
                return (
                  <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", maxHeight: 200 }}>

                    <path d={linePath} fill="none" stroke="var(--accent)" strokeWidth={2} />
                    <text x={PAD.l - 4} y={PAD.t + 4} textAnchor="end" fontSize={10} fill="var(--text3)">{yMax.toFixed(1)}%</text>
                    <text x={PAD.l - 4} y={H - PAD.b} textAnchor="end" fontSize={10} fill="var(--text3)">{yMin.toFixed(1)}%</text>
                    <text x={PAD.l} y={H - 6} textAnchor="start" fontSize={10} fill="var(--text3)">Day 1</text>
                    <text x={W - PAD.r} y={H - 6} textAnchor="end" fontSize={10} fill="var(--text3)">Day {pts.length}</text>
                    <text x={W / 2} y={H} textAnchor="middle" fontSize={10} fill="var(--text3)">Annualised Volatility (%)</text>

                );

                  <div key={t} className="signal-row">
                    <span className="signal-label mono">{t.replace(".NS", "")}</span>
                    <div className="signal-bar">
                      <div className="signal-fill" style={{ width: `${clamp(v * 1000, 0, 100)}%`, background: "var(--accent)" }} />
                    </div>
                    <span className="signal-val">{fmtMono(v, 4)}</span>
                  </div>
                ))}
                <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 10 }}>
                  Estimated market reset time: ~{Math.round(d.mixing_time_days || 0)} days ({((d.mixing_time_days || 0) / 252).toFixed(1)} years).
                </p>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// SETTINGS
function Settings() {
  const [store, setState] = useStore();
  const [url, setUrl] = useState(BASE);
  const [online, setOnline] = useState(null);

  async function ping() {
    try {
      await apiGet("/api/health");
      setOnline(true);
    } catch { setOnline(false); }
  }

  useEffect(() => { ping(); }, []);

  function importPortfolioCsv(parsed) {
    const importedValue = parsed.entries.reduce((sum, entry) => {
      const shares = Number.isFinite(entry.shares) ? entry.shares : 0;
      const price = Number.isFinite(entry.price) ? entry.price : 0;
      return sum + shares * price;
    }, 0);
    setState({
      tickers: parsed.tickers,
      portfolioEntries: parsed.entries,
      portfolioValue: importedValue > 0 ? Math.round(importedValue) : store.portfolioValue,
    });
  }

  return (
    <div className="page fade-in">
      <div className="section-header">
        <h1 className="section-title">Workspace Settings</h1>
        <p className="section-sub">Manage your data, defaults, and connection settings.</p>
        <div className="section-line" />
      </div>
      <div className="stack">
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Portfolio Import</h3>
          <PortfolioCsvImport onImport={importPortfolioCsv} />
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Backend Connection</h3>
          <div style={{ marginBottom: 12 }}>
            <label>API Base URL</label>
            <input value={url} onChange={e => setUrl(e.target.value)} />
            <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 4 }}>Uses same-origin API by default. Set <span className="mono">window.__VITE_API_BASE_URL</span> only if your API runs on another URL.</p>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button className="btn btn-sm btn-outline" onClick={ping}>Test Connection</button>
            {online !== null && (
              <span className={`badge ${online ? "badge-green" : "badge-red"}`}>{online ? "● Backend online" : "● Backend offline"}</span>
            )}
          </div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Default Portfolio</h3>
          <div className="form-grid">
            <div>
              <label>Risk-Free Rate (%)</label>
              <input type="number" value={store.riskFreeRate * 100} onChange={e => setState({ riskFreeRate: +e.target.value / 100 })} step="0.5" />
            </div>
            <div>
              <label>Portfolio Value (₹)</label>
              <input type="number" value={store.portfolioValue} onChange={e => setState({ portfolioValue: +e.target.value })} />
            </div>
          </div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Data</h3>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn btn-sm btn-outline" onClick={() => setState({
              m3: { result: null, status: "idle" }, m4: { result: null, status: "idle" },
              m5: { result: null, status: "idle" }, m6: { result: null, status: "idle" },
              m7: { result: null, status: "idle" },
            })}>Clear All Results</button>
            <button className="btn btn-sm btn-outline" onClick={() => { setState({ tickers: DEFAULT_PORTFOLIO_ENTRIES.map(entry => entry.ticker), portfolioEntries: DEFAULT_PORTFOLIO_ENTRIES, riskFreeRate: 0.07, portfolioValue: 1000000 }); }}>Reset Defaults</button>
          </div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 10 }}>About ClearView Analytics</h3>
          <div style={{ fontSize: 13, color: "var(--text3)", lineHeight: 1.7 }}>
            <p>ClearView Analytics focuses on portfolio modeling, stress analytics, allocation analytics, trade simulation, and market regime analytics.</p>
            <p style={{ marginTop: 6 }}>This platform provides analytics, not financial advice. Decision responsibility always remains with the user.</p>
            <p style={{ marginTop: 6 }}>Backend: FastAPI + Python. Frontend: React.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser] = useState(() => {
    try {
      const raw = window.localStorage.getItem(AUTH_PROFILE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  });
  const [authBooting, setAuthBooting] = useState(true);
  const [authError, setAuthError] = useState("");
  const [page, setPage] = useState("dashboard");
  const [store] = useStore();

  const refreshAuthFromApi = useCallback(async () => {
    try {
      const data = await apiGet("/api/auth/me");
      if (data?.user?.username) {
        window.localStorage.setItem(AUTH_PROFILE_KEY, JSON.stringify(data.user));
        setAuthUser(data.user);
        setAuthError("");
        return true;
      }
    } catch (err) {
      setAuthError(err?.message || "Authentication failed.");
    }
    window.localStorage.removeItem(AUTH_PROFILE_KEY);
    setAuthUser(null);
    return false;
  }, []);

  useEffect(() => {
    function clearAuth() {
      window.localStorage.removeItem(AUTH_TOKEN_KEY);
      window.localStorage.removeItem(AUTH_PROFILE_KEY);
      setAuthUser(null);
    }

    window.addEventListener("clearview-auth-expired", clearAuth);
    const token = window.localStorage.getItem(AUTH_TOKEN_KEY);
    if (!token) {
      setAuthBooting(false);
      return () => window.removeEventListener("clearview-auth-expired", clearAuth);
    }
    refreshAuthFromApi().finally(() => setAuthBooting(false));

    return () => {
      window.removeEventListener("clearview-auth-expired", clearAuth);
    };
  }, [refreshAuthFromApi]);

  function handleAuthReady(authPayload) {
    const token = authPayload?.token || "";
    const user = authPayload?.user || null;
    if (!token || !user) {
      setAuthError("Authentication response was invalid.");
      return;
    }
    window.localStorage.setItem(AUTH_TOKEN_KEY, token);
    window.localStorage.setItem(AUTH_PROFILE_KEY, JSON.stringify(user));
    setAuthUser(user);
    setAuthError("");
  }

  function handleLogout() {
    window.localStorage.removeItem(AUTH_TOKEN_KEY);
    window.localStorage.removeItem(AUTH_PROFILE_KEY);
    setAuthUser(null);
    setPage("dashboard");
  }

  if (authBooting) {
    return (
      <div className="auth-shell">
        <div className="auth-panel">
          <p className="auth-sub">Checking your session...</p>
        </div>
      </div>
    );
  }

  if (!authUser) {
    return <LoginGate onAuthenticated={handleAuthReady} authError={authError} />;
  }

  const NAV = [
    { id: "dashboard", label: "Executive Dashboard", icon: "⌂", module: null },
    { id: "portfolio", label: "Performance & Risk", icon: "◎", module: "m3" },
    { id: "stress", label: "Stress Scenarios", icon: "⚡", module: "m4" },
    { id: "optimisation", label: "Allocation Strategy", icon: "⬡", module: "m5" },
    { id: "trade", label: "Trade & Security", icon: "🔐", module: "m6" },
    { id: "regime", label: "Regime Outlook", icon: "◉", module: "m7" },
    { id: "settings", label: "Settings", icon: "⚙", module: null },
  ];

  const PAGES = { dashboard: Dashboard, portfolio: Portfolio, stress: StressTest, optimisation: Optimisation, trade: Trade, regime: Regime, settings: Settings };
  const PageComponent = PAGES[page] || Dashboard;

  const titles = {
    dashboard: "Executive Dashboard",
    portfolio: "Portfolio Performance & Risk",
    stress: "Stress Test Scenarios",
    optimisation: "Allocation Strategy Center",
    trade: "Trade Simulator & Security Review",
    regime: "Market Regime Outlook",
    settings: "Workspace Settings",
  };

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">CV</div>
          <div className="logo-text">ClearView Analytics</div>
        </div>
        <div className="nav-section">Modules</div>
        {NAV.map(n => {
          const status = n.module ? store[n.module]?.status : null;
          return (
            <div key={n.id} className={`nav-item${page === n.id ? " active" : ""}`} onClick={() => setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span style={{ flex: 1 }}>{n.label}</span>
              {status && <div className={`nav-dot ${status}`} />}
            </div>
          );
        })}
        <div style={{ flex: 1 }} />
        <div style={{ padding: "16px 20px", borderTop: "1px solid var(--border)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
            <div className={`nav-dot ${store.backendOnline ? "success" : "error"}`} />
            <span style={{ fontSize: 11, color: "var(--text3)" }}>{store.backendOnline ? "Backend online" : "Backend offline"}</span>
          </div>
        </div>
      </aside>
      <div className="main">
        {!store.backendOnline && (
          <div className="offline-banner">
            Backend is not reachable right now. Check your backend URL in Settings.
          </div>
        )}
        <header className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          <div className="topbar-tickers">
            {store.tickers.map(t => <span key={t} className="ticker-pill">{t}</span>)}
          </div>
          <span className="badge badge-gray" style={{ marginRight: 8 }}>
            {(authUser?.username || authUser?.name || authUser?.email || "").trim()}
          </span>
          <button className="btn btn-sm btn-outline" onClick={handleLogout}>Sign Out</button>
          <div className="backend-badge">
            <div className={`backend-dot${store.backendOnline ? "" : " offline"}`} />
            <span>{store.backendOnline ? "Connected" : "Offline"}</span>
          </div>
        </header>
        <PageComponent setPage={setPage} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
